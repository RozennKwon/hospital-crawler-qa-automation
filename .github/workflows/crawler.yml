name: Hospital-Recruit-QA-Pipeline

on:
  schedule:
    # 매일 오전 9시(KST) 정기 배치 실행 (UTC 00:00)
    - cron: '0 0 * * *'
  workflow_dispatch:
    # 수동 실행 모드: 신규 로직 테스트 및 데이터 검증용

# GitHub Actions에서 저장소(Repository)에 쓰기 권한을 부여하여 데이터 자동 업데이트 허용
permissions:
  contents: write

jobs:
  run-crawler-and-qa:
    name: Execute Data Collection & RaiT Validation
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4
      with:
        # 데이터 정합성 유지 및 히스토리 추적을 위해 전체 커밋 로그 로드
        fetch-depth: 0 

    - name: Setup Python Runtime (3.10)
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependency Packages
      run: |
        python -m pip install --upgrade pip
        pip install pandas selenium webdriver-manager openpyxl

    - name: Run Crawler & RaiT Validation Gateway
      run: |
        # 루트 경로에서 실행하여 내부 상대 경로(top-hospitals/) 정합성 유지
        python top-hospitals/main.py

    - name: CI/CD Automation - Push Validated Data
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Bot"
        
        # 중복 방지 히스토리 파일(seen_posts.csv) 스테이징
        git add top-hospitals/seen_posts.csv || echo "No changes to commit"
        
        # 데이터 변경 사항(신규 공고)이 발생한 경우에만 자동 커밋 및 푸시 실행
        git diff --quiet && git diff --staged --quiet || (git commit -m "ci: update validated recruitment data" && git push)

    - name: Archive QA Results & Error Logs (Artifacts)
      if: always() 
      uses: actions/upload-artifact@v4
      with:
        name: QA_Crawler_Artifacts
        # 수집된 엑셀 리포트 및 로그 파일을 빌드 결과물로 보존
        path: |
          **/*.xlsx
          **/*.csv
        if-no-files-found: warn