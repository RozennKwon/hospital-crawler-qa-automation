name: 일일 병원 채용공고 QA 크롤러 파이프라인

on:
  schedule:
    # 한국 시간(KST) 기준 매일 오전 9시 정기 배치 실행
    - cron: '0 0 * * *'
  workflow_dispatch:
    # 수동 실행 모드: 신규 병원 로직 추가 및 데이터 무결성 검증 테스트용

# GITHUB_TOKEN에 쓰기 권한을 부여하여 자동화된 데이터 업데이트(Push) 허용
permissions:
  contents: write

jobs:
  run-crawler-and-qa:
    name: 데이터 수집 및 RaiT 검증 프로세스
    runs-on: ubuntu-latest
    
    steps:
    - name: 소스 코드 체크아웃
      uses: actions/checkout@v4
      with:
        # 변경 이력 추적 및 seen_posts.csv 정합성 유지를 위해 전체 히스토리 로드
        fetch-depth: 0 

    - name: 런타임 환경 설정 (Python 3.10)
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 의존성 패키지 설치
      run: |
        python -m pip install --upgrade pip
        pip install pandas selenium webdriver-manager openpyxl

    - name: 크롤러 실행 및 RaiT 데이터 검증 게이트웨이 통과
      run: |
        cd top-hospitals
        # 수집(Scraping)과 검증(QA)이 통합된 메인 엔진 실행
        python main.py

    - name: CI/CD 자동화 - 데이터 무결성 확보 및 저장소 업데이트
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Bot"
        
        # 중복 방지 히스토리 파일(seen_posts.csv) 스테이징
        git add top-hospitals/seen_posts.csv || echo "No changes to commit"
        
        # 신규 공고가 발견되어 데이터 변화가 발생한 경우에만 자동 커밋 실행
        git diff --quiet && git diff --staged --quiet || (git commit -m "ci: RaiT 검증 완료된 신규 채용공고 데이터 업데이트" && git push)

    - name: QA 리포트 및 에러 로그 아카이빙 (Artifacts)
      if: always() # 프로세스 실패 시에도 원인 분석을 위해 결과물은 항상 보존
      uses: actions/upload-artifact@v4
      with:
        name: QA_Crawler_Artifacts
        path: |
          top-hospitals/*.xlsx
          top-hospitals/error_log_*.csv